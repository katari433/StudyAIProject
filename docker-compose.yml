version: "3.8"

services:
  # PostgreSQL Database for StudyAI
  postgres:
    image: postgres:15-alpine
    container_name: studyai_postgres
    environment:
      POSTGRES_DB: studyai_db
      POSTGRES_USER: studyai_user
      POSTGRES_PASSWORD: studyai_password_change_me
    volumes:
      # Persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose PostgreSQL on localhost:5432
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyai_user -d studyai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studyai_network
    command:
      - "postgres"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_duration=on"

volumes:
  postgres_data:
    driver: local

networks:
  studyai_network:
    driver: bridge
